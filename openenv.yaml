name: support-ticket-triage
version: 1.0.0
description: Real-world customer support ticket triaging environment for AI agent evaluation
author: Support Triage Team
license: MIT

# Environment metadata
env_type: real_world_task
domain: customer_support
difficulty_range: [easy, medium, hard]

# API specifications
api_version: 1.0
endpoints:
  - reset
  - step
  - state
  - render

# Action space
action_space:
  type: object
  properties:
    ticket_id:
      type: string
      description: ID of ticket to triage
    priority:
      type: string
      enum: [low, medium, high, critical]
      description: Assigned priority level
    category:
      type: string
      enum: [billing, technical, account, feature_request, bug_report]
      description: Ticket category
    assign_to_agent:
      type: string
      description: Agent ID to assign ticket to
    notes:
      type: string
      description: Optional triage notes

# Observation space
observation_space:
  type: object
  properties:
    current_step:
      type: integer
      description: Current step number
    queue_size:
      type: integer
      description: Number of tickets in queue
    tickets:
      type: array
      items:
        type: object
        properties:
          ticket_id:
            type: string
          subject:
            type: string
          priority:
            type: string
          category:
            type: string
          sentiment_score:
            type: number
      description: Current ticket queue (top N)
    agent_workload:
      type: object
      description: Current workload per agent
    metrics:
      type: object
      properties:
        priority_accuracy:
          type: number
        category_accuracy:
          type: number
        load_balance_std:
          type: number

# Reward specification
reward:
  description: Composite reward from classification accuracy, load balancing, and sentiment handling
  range: [-2.0, 2.0]
  components:
    - priority_classification
    - category_classification
    - load_balancing
    - sentiment_handling

# Tasks
tasks:
  - id: task_1
    name: "Easy - Basic Ticket Triage"
    description: "Triage 5 tickets with mostly LOW/MEDIUM priority. Focus on accuracy."
    difficulty: easy
    parameters:
      task_level: 1
      max_steps: 50
      expected_tickets: 5
    success_criteria:
      priority_accuracy_min: 0.90
      category_accuracy_min: 0.85
    expected_score_range: [0.6, 1.0]
  
  - id: task_2
    name: "Medium - Balanced Triage"
    description: "Triage 10 tickets with mixed priorities. Balance load across agents."
    difficulty: medium
    parameters:
      task_level: 2
      max_steps: 100
      expected_tickets: 10
    success_criteria:
      priority_accuracy_min: 0.80
      category_accuracy_min: 0.75
      load_balance_std_max: 1.0
    expected_score_range: [0.5, 0.95]
  
  - id: task_3
    name: "Hard - Complex High-Volume Triage"
    description: "Triage 15 tickets with CRITICAL priorities and complex sentiment. Optimize for all metrics."
    difficulty: hard
    parameters:
      task_level: 3
      max_steps: 150
      expected_tickets: 15
    success_criteria:
      priority_accuracy_min: 0.70
      category_accuracy_min: 0.65
      load_balance_std_max: 0.5
    expected_score_range: [0.3, 0.85]

# Testing requirements
testing:
  validation_steps: 100
  grader_reproducible: true
  grader_deterministic: true
  baseline_required: true

# Deployment
deployment:
  docker_required: true
  hf_spaces_compatible: true
  inference_timeout_seconds: 1200
  vcpu_minimum: 2
  memory_gb_minimum: 8
